position: Consumer
description: >-
  Agromonitoring is a technology company specializing in satellite-based
  agricultural monitoring. Using Sentinel-2 and Landsat imagery combined with
  weather and soil data, Agromonitoring provides vegetation index time series
  (NDVI, EVI, DSWI, LSWI), current weather, multi-day forecasts, and soil
  conditions for registered field polygons. The platform enables precision
  agriculture workflows including crop health assessment, irrigation
  optimization, yield prediction, and climate risk monitoring.

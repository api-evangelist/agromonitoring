naftiko: 1.0.0-alpha2
info:
  label: Agromonitoring Agro API — Polygons
  description: 'Agromonitoring Agro API — Polygons. 4 operations. Lead operation: Agromonitoring List Polygons. Self-contained
    Naftiko capability covering one Agromonitoring business surface.'
  tags:
  - Agromonitoring
  - Polygons
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGROMONITORING_API_KEY: AGROMONITORING_API_KEY
capability:
  consumes:
  - type: http
    namespace: agromonitoring-polygons
    baseUri: https://api.agromonitoring.com/agro/1.0
    description: Agromonitoring Agro API — Polygons business capability. Self-contained, no shared references.
    resources:
    - name: polygons
      path: /polygons
      operations:
      - name: listpolygons
        method: GET
        description: Agromonitoring List Polygons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appid
          in: query
          type: string
          description: API key for authentication.
          required: true
      - name: createpolygon
        method: POST
        description: Agromonitoring Create Polygon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appid
          in: query
          type: string
          description: API key for authentication.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: polygons-polyid
      path: /polygons/{polyid}
      operations:
      - name: getpolygon
        method: GET
        description: Agromonitoring Get Polygon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: polyid
          in: path
          type: string
          description: Unique identifier for the polygon.
          required: true
        - name: appid
          in: query
          type: string
          description: API key for authentication.
          required: true
      - name: deletepolygon
        method: DELETE
        description: Agromonitoring Delete Polygon
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: polyid
          in: path
          type: string
          description: Unique identifier for the polygon.
          required: true
        - name: appid
          in: query
          type: string
          description: API key for authentication.
          required: true
    authentication:
      type: apikey
      key: appid
      value: '{{env.AGROMONITORING_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: agromonitoring-polygons-rest
    port: 8080
    description: REST adapter for Agromonitoring Agro API — Polygons. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/polygons
      name: polygons
      description: REST surface for polygons.
      operations:
      - method: GET
        name: listpolygons
        description: Agromonitoring List Polygons
        call: agromonitoring-polygons.listpolygons
        with:
          appid: rest.appid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpolygon
        description: Agromonitoring Create Polygon
        call: agromonitoring-polygons.createpolygon
        with:
          appid: rest.appid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/polygons/{polyid}
      name: polygons-polyid
      description: REST surface for polygons-polyid.
      operations:
      - method: GET
        name: getpolygon
        description: Agromonitoring Get Polygon
        call: agromonitoring-polygons.getpolygon
        with:
          polyid: rest.polyid
          appid: rest.appid
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepolygon
        description: Agromonitoring Delete Polygon
        call: agromonitoring-polygons.deletepolygon
        with:
          polyid: rest.polyid
          appid: rest.appid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agromonitoring-polygons-mcp
    port: 9090
    transport: http
    description: MCP adapter for Agromonitoring Agro API — Polygons. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: agromonitoring-list-polygons
      description: Agromonitoring List Polygons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agromonitoring-polygons.listpolygons
      with:
        appid: tools.appid
      outputParameters:
      - type: object
        mapping: $.
    - name: agromonitoring-create-polygon
      description: Agromonitoring Create Polygon
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agromonitoring-polygons.createpolygon
      with:
        appid: tools.appid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: agromonitoring-get-polygon
      description: Agromonitoring Get Polygon
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agromonitoring-polygons.getpolygon
      with:
        polyid: tools.polyid
        appid: tools.appid
      outputParameters:
      - type: object
        mapping: $.
    - name: agromonitoring-delete-polygon
      description: Agromonitoring Delete Polygon
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: agromonitoring-polygons.deletepolygon
      with:
        polyid: tools.polyid
        appid: tools.appid
      outputParameters:
      - type: object
        mapping: $.
